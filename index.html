<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
  />   
<title>Bagas LinkTree</title>
</head>

<body>
    <div class="container animate__animated animate__rollIn">

        <div class="profile">
            <img src="dinooo.gif" alt="error image" class="animate__animated animate__pulse animate__infinite animate__delay-1s"/>
            <p class="animate__animated animate__jackInTheBox animate__infinite animate__delay-1s">Tap Tap Disini</p>
        </div>
        
        <div class="link">
            <a href="https://instagram.com" class="animate__animated animate__flipInY animate__infinite animate__delay-1s">Instagram</a>
            <a href="https://web.telegram.org" class="animate__animated animate__flipInY animate__infinite animate__delay-2s">Telegram</a>
            <a href="https://youtube.com" class="animate__animated animate__flipInY animate__infinite animate__delay-3s">YouTube</a>
            <a href="https://x.com" class="animate__animated animate__flipInY animate__infinite animate__delay-4s">X</a>
        </div>

        <div class="footer animate__animated animate__fadeInUp animate__infinite animate__delay-5s">
            <i>made by Bagas😎 </i>
        </div>



    </div>

</body>

</html>
